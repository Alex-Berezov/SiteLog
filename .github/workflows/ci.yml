name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          
      - name: Install dependencies (Server)
        run: yarn --cwd server install --frozen-lockfile
        
      - name: Install dependencies (Client)
        run: yarn --cwd client install --frozen-lockfile
        
      - name: Lint Server
        run: yarn --cwd server run lint
        
      - name: Lint Client
        run: yarn --cwd client run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sitelog
          POSTGRES_PASSWORD: sitelog
          POSTGRES_DB: sitelog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          
      - name: Install dependencies (Server)
        run: yarn --cwd server install --frozen-lockfile
        
      - name: Generate Prisma Client
        run: yarn --cwd server run prisma:generate
        
      - name: Run Server Tests
        env:
          DATABASE_URL: postgresql://sitelog:sitelog@localhost:5432/sitelog_test
        run: yarn --cwd server run test || echo "No server tests yet"
        
      - name: Install dependencies (Client)
        run: yarn --cwd client install --frozen-lockfile
        
      - name: Run Client Tests
        run: yarn --cwd client run test || echo "No client tests yet"

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: sitelog-server:latest
          
      - name: Build Client Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./client/Dockerfile
          push: false
          tags: sitelog-client:latest

services:
  postgres:
    image: postgres:16-alpine
    container_name: sitelog-postgres
    environment:
      POSTGRES_USER: sitelog
      POSTGRES_PASSWORD: sitelog
      POSTGRES_DB: sitelog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitelog"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sitelog-server
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://sitelog:sitelog@postgres:5432/sitelog
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: sitelog-client
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  postgres_data:
